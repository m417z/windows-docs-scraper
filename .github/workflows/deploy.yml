name: Generate

on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * SUN'

concurrency:
  group: generate
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: main
      - name: Checkout MicrosoftDocs/windows-driver-docs-ddi
        uses: actions/checkout@v6
        with:
          repository: MicrosoftDocs/windows-driver-docs-ddi
          path: windows-driver-docs-ddi
      - name: Checkout MicrosoftDocs/sdk-api
        uses: actions/checkout@v6
        with:
          repository: MicrosoftDocs/sdk-api
          path: sdk-api
      - name: Checkout MicrosoftDocs/windows-driver-docs
        uses: actions/checkout@v6
        with:
          repository: MicrosoftDocs/windows-driver-docs
          path: windows-driver-docs
      - name: Checkout MicrosoftDocs/win32
        uses: actions/checkout@v6
        with:
          repository: MicrosoftDocs/win32
          path: win32
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r main/requirements.txt
      - name: Generate docs - Windows Driver Kit DDI
        run: |
          cd main
          python -u scraper.py \
            --repository windows-driver-docs-ddi \
            --input ../windows-driver-docs-ddi \
            --output ./output/windows-driver-docs-ddi
      - name: Generate docs - Win32 API
        run: |
          cd main
          python -u scraper.py \
            --repository sdk-api \
            --input ../sdk-api \
            --output ./output/sdk-api
      - name: Generate docs - Windows Driver Documentation
        run: |
          cd main
          python -u scraper.py \
            --repository windows-driver-docs \
            --input ../windows-driver-docs \
            --output ./output/windows-driver-docs
      - name: Generate docs - Win32
        run: |
          cd main
          python -u scraper.py \
            --repository win32 \
            --input ../win32 \
            --output ./output/win32
      - name: Deploy
        run: |
          src_dir=main/output
          deploy_dir="${{ runner.temp }}/deploy"
          deploy_branch=gh-pages

          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          echo Cloning the repository
          git clone --branch $deploy_branch --depth 1 --filter=blob:none --no-checkout https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git "$deploy_dir"
          echo Adding generated files to the repository
          git --git-dir="$deploy_dir/.git" --work-tree="$src_dir" add -A
          touch "$deploy_dir/.nojekyll"
          git -C "$deploy_dir" add .nojekyll
          echo Committing changes
          git -C "$deploy_dir" diff-index --cached --quiet HEAD || git -C "$deploy_dir" commit -m "deploy: ${{ github.sha }}"
          echo Pushing to GitHub
          git -C "$deploy_dir" push origin $deploy_branch
